name: Publish Deltakit-Stim

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: fast-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Build wheels
    strategy:
      matrix:
        os_dist:
          - {os: ubuntu-latest, dist: cp310-manylinux_x86_64}
          - {os: ubuntu-latest, dist: cp311-manylinux_x86_64}
          - {os: ubuntu-latest, dist: cp312-manylinux_x86_64}
          - {os: ubuntu-latest, dist: cp313-manylinux_x86_64}
          - {os: macos-latest, dist: cp310-macosx_x86_64, arch: x86_64}
          - {os: macos-latest, dist: cp311-macosx_x86_64, arch: x86_64}
          - {os: macos-latest, dist: cp312-macosx_x86_64, arch: x86_64}
          - {os: macos-latest, dist: cp313-macosx_x86_64, arch: x86_64}
          - {os: macos-latest, dist: cp310-macosx_arm64, arch: arm64}
          - {os: macos-latest, dist: cp311-macosx_arm64, arch: arm64}
          - {os: macos-latest, dist: cp312-macosx_arm64, arch: arm64}
          - {os: macos-latest, dist: cp313-macosx_arm64, arch: arm64}
    runs-on: ${{ matrix.os_dist.os }}
    env:
      CIBW_BUILD: "${{ matrix.os_dist.dist }}"
      CIBW_ARCHS_MACOS: "${{ matrix.os_dist.arch }}"
    steps:
      - name: Check out Deltakit-Stim main code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0

      - uses: actions/upload-artifact@v7
        with:
          name: "dist-${{ matrix.os_dist.dist }}"
          path: ./wheelhouse/*.whl

  build_sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10.*'
      - run: python -m pip install setuptools
      - run: python -m pip install pybind11==2.9.2
      - run: python setup.py sdist
      - uses: actions/upload-artifact@v7
        with:
          name: dist-sdist
          path: ./dist/*.tar.gz

  publish:
    name: Publish Python distribution to PyPI
    needs: [build_sdist, build_wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/deltakit-stim
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing
    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v7
      with:
        pattern: dist-*
        path: ./dist/
        merge-multiple: true
    - run: ls dist/ 
    - name: Publish distribution to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
